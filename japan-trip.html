<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="日本之旅">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>日本之旅</title>
<script>
(function(){
  const S=512,c=document.createElement('canvas');c.width=c.height=S;
  const x=c.getContext('2d');
  const bg=x.createLinearGradient(0,0,0,S);
  bg.addColorStop(0,'#C0392B');bg.addColorStop(1,'#E74C3C');
  x.fillStyle=bg;x.beginPath();x.roundRect(0,0,S,S,96);x.fill();
  x.fillStyle='rgba(255,255,255,0.95)';
  x.beginPath();x.roundRect(80,140,352,30,6);x.fill();
  x.beginPath();x.roundRect(110,195,292,22,5);x.fill();
  x.beginPath();x.roundRect(148,217,34,200,6);x.fill();
  x.beginPath();x.roundRect(330,217,34,200,6);x.fill();
  x.beginPath();x.moveTo(80,140);x.lineTo(148,100);x.lineTo(182,140);x.closePath();x.fill();
  x.beginPath();x.moveTo(432,140);x.lineTo(364,100);x.lineTo(330,140);x.closePath();x.fill();
  ['icon','apple-touch-icon'].forEach(r=>{const l=document.createElement('link');l.rel=r;l.href=c.toDataURL('image/png');document.head.appendChild(l);});
})();
</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --blue:#0077B6;--blue2:#023E8A;--cyan:#00B4D8;
  --orange:#F4A261;--green:#10B981;--red:#EF4444;--purple:#7C3AED;
  --bg:#F0F4F8;--card:#fff;--text:#1A1A2E;--muted:#6B7280;--border:#E5E7EB;
  --tab-h:60px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* Setup */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:28px 20px;background:linear-gradient(150deg,var(--blue2),var(--blue) 55%,var(--cyan));}
#setup h1{font-size:34px;font-weight:800;color:#fff;margin-bottom:6px;text-align:center;}
#setup p{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:26px;text-align:center;}
.scard{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:420px;}
.hint{font-size:11px;color:#aaa;margin-top:10px;text-align:center;line-height:1.6;}

/* App */
#app{display:none;flex-direction:column;height:100dvh;}
.hdr{position:relative;height:168px;flex-shrink:0;overflow:hidden;}
.hdr-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 35%;}
.hdr-overlay{position:absolute;inset:0;z-index:5;background:linear-gradient(to bottom,rgba(0,0,0,.08) 0%,transparent 35%,rgba(0,0,0,.18) 60%,rgba(0,0,0,.62) 100%);}
.hdr-title-block{position:absolute;top:16px;left:18px;z-index:20;}
.hdr-t{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.55),0 2px 24px rgba(0,0,0,.28);line-height:1;}
.hdr-s{font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px;margin-top:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#6EE7B7;}
.dot.busy{background:var(--orange);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);user-select:none;transition:color .15s;}
.ti.on{color:var(--blue);}.ti-i{font-size:22px;line-height:1;}.ti-l{font-size:10px;font-weight:600;}
.page{display:none;}.page.on{display:block;}
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 14px);right:16px;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:var(--blue);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,119,182,.4);z-index:99;transition:transform .12s,background .2s;}
.fab:active{transform:scale(.9);}
.fab-menu{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 76px);right:16px;display:flex;flex-direction:column;gap:8px;z-index:98;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .18s,transform .18s;}
.fab-menu.open{opacity:1;pointer-events:auto;transform:translateY(0);}
.fab-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:24px;padding:10px 16px;box-shadow:0 2px 10px rgba(0,0,0,.15);cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap;}
.fab-item:active{opacity:.7;}

/* Shared */
.bx{padding:12px 16px;}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-b{background:var(--blue);color:#fff;}.btn-g{background:var(--bg);color:var(--text);}.btn-r{background:var(--red);color:#fff;}.btn-w{width:100%;}
.ib{width:28px;height:28px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.fg{margin-bottom:14px;}
.lb{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.inp,.ta{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s;}
.inp:focus,.ta:focus{border-color:var(--blue);}
.ta{resize:none;min-height:72px;}
.fr{display:flex;gap:10px;}.fr .fg{flex:1;}
.tw{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;}
.to{flex:1;padding:8px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;}
.to.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-i{font-size:46px;margin-bottom:12px;}.empty-h{font-size:16px;font-weight:600;}.empty-s{font-size:14px;margin-top:4px;}
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 70px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;align-items:flex-end;}
.ov.open{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:93dvh;overflow-y:auto;padding:16px 20px calc(20px + var(--safe-b));animation:up .22s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.hdl{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:18px;font-weight:700;margin-bottom:18px;}

/* Schedule */
.day-card{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:border .15s;}
.day-card.drop-over{border:2px dashed var(--blue);background:#EFF8FF;}
.day-hdr{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.day-n{width:40px;height:40px;border-radius:10px;background:var(--blue);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-info{flex:1;min-width:0;}
.day-tit{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;}
.day-eb{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:5px;}
.day-dt{font-size:12px;color:var(--muted);margin-top:2px;}
.day-chev{color:var(--muted);font-size:20px;transition:transform .2s;flex-shrink:0;}
.day-card.open .day-chev{transform:rotate(90deg);}
.day-body{display:none;border-top:1px solid var(--border);}
.day-card.open .day-body{display:block;}

.act-row{display:flex;align-items:flex-start;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px;cursor:grab;transition:opacity .2s;}
.act-handle{width:18px;font-size:14px;color:var(--border);cursor:grab;flex-shrink:0;display:flex;align-items:center;user-select:none;}
.act-handle:active{cursor:grabbing;}
.act-row.drag-over-act{border-top:2px solid var(--blue);}
.act-row:last-of-type{border-bottom:none;}
.act-row.dragging{opacity:.3;cursor:grabbing;}
.act-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:1px;}
.act-body{flex:1;min-width:0;}
.act-time{font-size:12px;color:var(--muted);font-weight:600;}
.act-name{font-size:15px;font-weight:600;margin-top:1px;}
.act-loc a{font-size:12px;color:var(--blue);margin-top:2px;display:flex;align-items:center;gap:3px;text-decoration:none;}
.act-note-t{font-size:12px;color:var(--muted);margin-top:2px;font-style:italic;}
.act-cost{font-size:12px;font-weight:700;color:var(--green);margin-top:3px;}
.act-btns{display:flex;gap:4px;flex-shrink:0;}
.day-add{display:flex;align-items:center;gap:8px;padding:12px 16px;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;}

.ac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.ac-btn{padding:9px 3px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .12s;}
.ac-btn.on{border-color:var(--blue);background:#EFF8FF;}
.ac-i{font-size:20px;display:block;}.ac-n{font-size:10px;margin-top:2px;color:var(--muted);font-weight:600;}
.ac-btn.on .ac-n{color:var(--blue);}
.cost-box{background:#F0FDF4;border-radius:10px;padding:14px;margin-bottom:14px;}
.cost-box .lb{color:#065F46;}

/* Expenses – compact balance */
.bc-card{background:linear-gradient(135deg,var(--blue2),#0096C7);border-radius:12px;padding:14px 16px;margin-bottom:8px;color:#fff;}
.bc-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;}
.bc-row+.bc-row{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.2);}
.bc-flag{font-size:14px;font-weight:700;}
.bc-tot{font-size:18px;font-weight:800;margin-left:6px;}
.bc-ps{font-size:11px;opacity:.75;margin-top:2px;}
.bc-settle{font-size:12px;font-weight:700;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px;white-space:nowrap;}
.bc-settle.ok{background:rgba(16,185,129,.25);}
.twd-row{background:linear-gradient(135deg,var(--purple),#A78BFA);}

/* Pie chart */
.pie-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.pie-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pie-title{font-size:14px;font-weight:700;}
.pie-tabs{display:flex;gap:6px;}
.pie-tab{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--muted);}
.pie-tab.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.pie-tab.twd.on{background:var(--purple);border-color:var(--purple);}
.pie-body{display:flex;align-items:center;gap:12px;}
.pie-legend{flex:1;min-width:0;}
.pie-leg-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;}
.pie-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.pie-cat{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pie-amt{font-size:12px;font-weight:700;text-align:right;white-space:nowrap;}
.pie-pct{font-size:11px;color:var(--muted);width:32px;text-align:right;flex-shrink:0;}
.pie-rate{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}

/* Expense list */
.edl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:2px 4px;margin-top:8px;margin-bottom:4px;}
.er{background:var(--card);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.ei{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.einfo{flex:1;min-width:0;}
.edesc{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emeta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.eright{text-align:right;flex-shrink:0;}
.eamt{font-size:17px;font-weight:700;}
.bdg{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;}
.bp1{background:#DBEAFE;color:#1D4ED8;}.bp2{background:#FCE7F3;color:#BE185D;}
.baud{background:#E0F2FE;color:#0369A1;}.btwd{background:#EDE9FE;color:#6D28D9;}.bact{background:#D1FAE5;color:#065F46;}

.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.cat-btn{padding:9px 3px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .12s;}
.cat-btn.on{border-color:var(--blue);background:#EFF8FF;}
.cati{font-size:21px;display:block;}.catn{font-size:10px;margin-top:2px;color:var(--muted);font-weight:600;}
.cat-btn.on .catn{color:var(--blue);}
.pr{display:flex;gap:8px;}
.pb{flex:1;padding:11px;border-radius:10px;border:2px solid var(--border);background:#fff;text-align:center;cursor:pointer;font-size:14px;font-weight:600;transition:all .12s;}
.pb.p1.on{border-color:#3B82F6;background:#DBEAFE;color:#1D4ED8;}
.pb.p2.on{border-color:#EC4899;background:#FCE7F3;color:#BE185D;}
.cur-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;}
.cr{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;color:var(--muted);transition:all .15s;}
.cr.aud.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.cr.twd.on{background:#fff;color:var(--purple);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* Notes */
.nc{background:var(--card);border-radius:12px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nh{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.nt2{font-size:16px;font-weight:700;flex:1;}
.na{display:flex;gap:5px;flex-shrink:0;}
.np{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.5;}
.nd{font-size:11px;color:var(--muted);margin-top:8px;}
.nimg{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:9px;}
.clr{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
.clc{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.clc.done{background:var(--green);border-color:var(--green);color:#fff;}
.clc.done::after{content:'✓';font-size:11px;font-weight:700;}
.clt{font-size:14px;}.clt.done{text-decoration:line-through;color:var(--muted);}
.clp{font-size:12px;color:var(--muted);margin-top:3px;}
.cer{display:flex;align-items:center;gap:8px;padding:3px 0;}
.cer input{flex:1;border:none;border-bottom:1.5px solid var(--border);padding:6px 0;font-size:15px;outline:none;font-family:inherit;}
.cer input:focus{border-color:var(--blue);}
.imgarea{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;cursor:pointer;color:var(--muted);}
.imgprev{width:100%;max-height:180px;object-fit:cover;border-radius:8px;}

/* Settings */
.slbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 4px;margin-bottom:7px;margin-top:4px;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
#drag-ghost{position:fixed;z-index:999;background:white;border-radius:10px;padding:10px 16px;box-shadow:0 8px 24px rgba(0,0,0,.3);font-weight:600;font-size:14px;pointer-events:none;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transform:rotate(-2deg);display:flex;align-items:center;gap:8px;}
.day-num{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:#1A3A78;letter-spacing:.2px;}
.day-date-badge{font-size:10px;font-weight:600;color:#6B8FC4;background:#EBF2FC;border-radius:5px;padding:2px 7px;margin-left:2px;}
.day-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px;}
.wchip{display:inline-flex;align-items:center;gap:2px;background:#E8F3FC;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;color:#1A5BA8;}
.schip{display:inline-flex;align-items:center;gap:2px;background:#EAF5EA;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;color:#1E7D32;}
</style>
</head>
<body>

<div id="setup">
  <h1>🇯🇵 日本之旅</h1>
  <p>輸入 Firebase Realtime Database 網址開始</p>
  <div class="scard">
    <div class="fg"><label class="lb">Firebase 資料庫網址</label><input class="inp" id="s_url" type="url" placeholder="https://xxx-default-rtdb.firebaseio.com"></div>
    <div class="fg"><label class="lb">旅遊標題</label><input class="inp" id="s_title" placeholder="例：東京之旅 🗾"></div>
    <div class="fr">
      <div class="fg"><label class="lb">旅伴 1</label><input class="inp" id="s_p1" placeholder="Jenna"></div>
      <div class="fg"><label class="lb">旅伴 2</label><input class="inp" id="s_p2" placeholder="男友"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="lb">出發日期</label><input class="inp" id="s_start" type="date"></div>
      <div class="fg"><label class="lb">天數</label><input class="inp" id="s_days" type="number" value="7" min="1" max="30"></div>
    </div>
    <div class="fg"><label class="lb">Header 照片網址（選填）</label><input class="inp" id="s_photo" type="url" placeholder="https://...jpg"></div>
    <div class="fg"><label class="lb">主要城市</label>
      <select class="inp" id="s_city">
        <option value="東京">東京</option>
        <option value="大阪">大阪</option>
        <option value="京都">京都</option>
        <option value="岡山" selected>岡山</option>
        <option value="札幌">札幌</option>
        <option value="福岡">福岡</option>
      </select>
    </div>
    <div class="fg"><label class="lb">Gemini API Key</label><input class="inp" id="s_gemini" type="password" placeholder="AIza…"></div>
    <button class="btn btn-b btn-w" onclick="doSetup()">開始使用 →</button>
    <p class="hint">Firebase Console → Realtime Database → 建立資料庫（測試模式）→ 複製網址</p>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <img class="hdr-photo" id="hdrPhoto" src="" alt="" style="display:none">
    <div class="hdr-overlay"></div>

<script>
const RECEIPT_PROMPT=`你是日本收據辨識助手。請分析這張收據圖片，只回傳以下 JSON，不加任何說明：
{"store":"店名（若看不清則填空字串）","amount":金額數字（日圓整數含稅）,"currency":"JPY","category":"food|transport|hotel|shopping|ticket|activity","date":"YYYY-MM-DD（若看不清則填今天）"}
注意：日本收據常見外税(8%/10%)與内税，請確認取含税最終金額。`;
const CATS=[
  {id:'food',ico:'🍽️',name:'餐飲',bg:'#FEF3C7'},{id:'transport',ico:'🚌',name:'交通',bg:'#DBEAFE'},
  {id:'hotel',ico:'🏨',name:'住宿',bg:'#EDE9FE'},{id:'activity',ico:'🎡',name:'活動',bg:'#D1FAE5'},
  {id:'shopping',ico:'🛍️',name:'購物',bg:'#FCE7F3'},{id:'ticket',ico:'🎟️',name:'門票',bg:'#FEE2E2'},
  {id:'cafe',ico:'☕',name:'咖啡',bg:'#FEF3C7'},{id:'other',ico:'📦',name:'其他',bg:'#F3F4F6'},
];
const CATM=Object.fromEntries(CATS.map(c=>[c.id,c]));
const PCOL={food:'#F59E0B',transport:'#3B82F6',hotel:'#8B5CF6',activity:'#10B981',shopping:'#EC4899',ticket:'#EF4444',cafe:'#F97316',other:'#94A3B8'};
const ACTS=[
  {id:'sight',ico:'🏛️',name:'景點',bg:'#EDE9FE'},{id:'food',ico:'🍽️',name:'餐廳',bg:'#FEF3C7'},
  {id:'transport',ico:'🚌',name:'交通',bg:'#DBEAFE'},{id:'hotel',ico:'🏨',name:'住宿',bg:'#D1FAE5'},
  {id:'shopping',ico:'🛍️',name:'購物',bg:'#FCE7F3'},{id:'fun',ico:'🎭',name:'娛樂',bg:'#FEE2E2'},
  {id:'beach',ico:'🏖️',name:'海灘',bg:'#E0F2FE'},{id:'other',ico:'📌',name:'其他',bg:'#F3F4F6'},
];
const ACTM=Object.fromEntries(ACTS.map(c=>[c.id,c]));
const CITIES={
  '東京':{lat:35.68,lng:139.69},
  '大阪':{lat:34.69,lng:135.50},
  '京都':{lat:35.01,lng:135.77},
  '岡山':{lat:34.66,lng:133.93},
  '札幌':{lat:43.06,lng:141.35},
  '福岡':{lat:33.59,lng:130.40},
};
// Map schedule activity type → expense category
function mapActCat(actCat){
  if(actCat==='food')return'food';
  if(actCat==='transport')return'transport';
  if(actCat==='hotel')return'hotel';
  if(actCat==='shopping')return'shopping';
  if(actCat==='sight')return'ticket';
  return'activity';
}

let CFG={},DB=null,curTab='sched';
let weatherByDate=new Map();
let curCat='food',curPayer=0,curSplit='both',curCur='JPY';
let curAC='sight',curACur='JPY',curAPayer=0,curASplit='both';
let curNT='text',curImg=null,curPieCur='JPY',lastExps={},exchRate=null;
const DG={on:false,did:null,aid:null,act:null,srcEl:null,ghost:null,timer:null,sx:0,sy:0};
let curActOrder=0;

// ─── Utils ───────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const japanDate=(d=new Date())=>d.toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'});
const today=()=>japanDate();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtD=d=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('zh-TW',{month:'short',day:'numeric',weekday:'short'});};
const fmtDt=iso=>{const d=new Date(iso);return d.toLocaleDateString('zh-TW',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});};
const fmtDayBadge=d=>{if(!d)return'';const dt=new Date(d+'T12:00:00');const w=['日','一','二','三','四','五','六'][dt.getDay()];return`${dt.getMonth()+1}月${dt.getDate()}日（${w}）`;};
// Pure UTC date arithmetic – no timezone drift
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n));return dt.toISOString().split('T')[0];}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function sync(on){document.getElementById('syncDot').className='dot'+(on?' busy':'');document.getElementById('syncTxt').textContent=on?'同步中…':'已同步';}

function closeM(id){document.getElementById(id).classList.remove('open');}

// ─── Exchange rate ────────────────────────────────────
async function fetchRate(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/JPY');
    const d=await r.json();
    if(d.result==='success'&&d.rates?.TWD){
      exchRate=d.rates.TWD;
      const el=document.getElementById('pieRate');
      if(el)el.textContent=`即時匯率 1 JPY ≈ NT$${exchRate.toFixed(4)}（台灣銀行參考）`;
    }
  }catch(e){exchRate=null;}
}

async function scanReceipt(base64Image){
  if(!CFG.geminiKey)return null;
  try{
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${CFG.geminiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[
        {text:RECEIPT_PROMPT},
        {inline_data:{mime_type:'image/jpeg',data:base64Image}}
      ]}]})}
    );
    const json=await res.json();
    const raw=json.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const cleaned=raw.replace(/```json|```/g,'').trim();
    return JSON.parse(cleaned);
  }catch(e){return null;}
}

function onReceiptPick(ev){
  const f=ev.target.files[0];ev.target.value='';if(!f)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    toast('🔍 辨識收據中…');
    const base64=e.target.result.split(',')[1];
    const data=await scanReceipt(base64);
    if(data&&data.amount>0){
      openExpMPrefilled(data);
    }else{
      toast('⚠️ 辨識失敗，請手動輸入');
      openExpM();
    }
  };
  reader.readAsDataURL(f);
}

function weatherDesc(code){
  if(code===0)return{icon:'☀️',desc:'晴'};
  if(code<=3)return{icon:'⛅',desc:'多雲'};
  if(code===45||code===48)return{icon:'🌫️',desc:'霧'};
  if(code>=51&&code<=67)return{icon:'🌧️',desc:'有雨'};
  if(code>=80&&code<=82)return{icon:'🌦️',desc:'陣雨'};
  if(code>=95&&code<=99)return{icon:'⛈️',desc:'雷雨'};
  return{icon:'☁️',desc:'陰'};
}
async function fetchWeather(){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat||35.68}&longitude=${CFG.lng||139.69}&hourly=temperature_2m,weathercode&timezone=auto&forecast_days=16`);
    const d=await r.json();
    const times=d.hourly.time,temps=d.hourly.temperature_2m,codes=d.hourly.weathercode;
    weatherByDate=new Map();
    times.forEach((t,i)=>{
      if(t.endsWith('T12:00')){
        const ds=t.split('T')[0];
        const{icon,desc}=weatherDesc(codes[i]);
        weatherByDate.set(ds,{temp:Math.round(temps[i]),icon,desc});
      }
    });
  }catch(e){weatherByDate=new Map();}
}

// ─── Setup ───────────────────────────────────────────
function doSetup(){
  const url=document.getElementById('s_url').value.trim();
  if(!url){alert('請輸入 Firebase 資料庫網址');return;}
  const city=document.getElementById('s_city').value||'東京';
  const coords=CITIES[city]||{lat:35.68,lng:139.69};
  CFG={url,title:document.getElementById('s_title').value.trim()||'日本之旅',
    p1:document.getElementById('s_p1').value.trim()||'旅伴1',
    p2:document.getElementById('s_p2').value.trim()||'旅伴2',
    start:document.getElementById('s_start').value||today(),
    days:parseInt(document.getElementById('s_days').value)||7,
    photo:document.getElementById('s_photo').value.trim(),
    city,lat:coords.lat,lng:coords.lng,
    geminiKey:document.getElementById('s_gemini').value.trim()};
  localStorage.setItem('japan_trip',JSON.stringify(CFG));
  bootApp();
}
window.onload=()=>{
  const s=localStorage.getItem('japan_trip');
  if(s){CFG=JSON.parse(s);bootApp();}
  else document.getElementById('s_start').value=today();
};

  document.getElementById('sp-p2').textContent=CFG.p2+'自付';
  document.getElementById('asp-p1').textContent=CFG.p1+'自付';
  document.getElementById('asp-p2').textContent=CFG.p2+'自付';

  document.getElementById('c_p1').value=CFG.p1;document.getElementById('c_p2').value=CFG.p2;
  document.getElementById('c_start').value=CFG.start;document.getElementById('c_days').value=CFG.days;

  document.getElementById('c_city').value=CFG.city||'東京';

  renderCatGrid();renderACGrid();initDnD();initActDnD();
  fetchWeather().finally(()=>connectFB());
  fetchRate();
}

// ─── Firebase ────────────────────────────────────────
function connectFB(){
  sync(true);
  try{
    if(!firebase.apps.length)firebase.initializeApp({databaseURL:CFG.url.trim().replace(/\/$/,'')});
    DB=firebase.database();
    DB.ref('/').on('value',snap=>{
      const d=snap.val()||{};
      const sched=d.schedule||{};
      const keys=Object.keys(sched);
      if(!keys.length){
        createFullSchedule();
      } else {
        // Auto-fix wrong dates (handles old buggy data)
        const expected=addDays(CFG.start,0);
        if(sched['day1']&&sched['day1'].date!==expected) fixDates(false);
      }
      lastExps=d.expenses||{};
      renderSched(sched);
      renderExp(lastExps);
      renderStat(lastExps);
      sync(false);
    },err=>{sync(false);toast('⚠️ Firebase 錯誤：'+err.message);});

// ─── Drag & Drop ─────────────────────────────────────
function initDnD(){
  const box=document.getElementById('schedBox');
  box.addEventListener('touchstart',e=>{
    const row=e.target.closest('.act-row');
    if(!row||e.target.closest('button,a,.act-btns'))return;
    DG.sx=e.touches[0].clientX;DG.sy=e.touches[0].clientY;
    DG.timer=setTimeout(()=>{
      const did=row.dataset.did,aid=row.dataset.aid;
      DB.ref('/schedule/'+did+'/acts/'+aid).once('value',snap=>{
        if(!snap.val())return;
        navigator.vibrate&&navigator.vibrate(40);
        DG.on=true;DG.did=did;DG.aid=aid;DG.act=snap.val();DG.srcEl=row;
        row.classList.add('dragging');
        const g=document.createElement('div');g.id='drag-ghost';
        const ac=ACTM[DG.act.cat]||ACTM.other;
        g.innerHTML=`<span>${ac.ico}</span>${esc(DG.act.name||'活動')}`;
        g.style.left=(DG.sx-110)+'px';g.style.top=(DG.sy-22)+'px';
        document.body.appendChild(g);DG.ghost=g;
        document.querySelectorAll('.day-card').forEach(c=>c.classList.add('droppable'));
      });
    },500);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    if(Math.abs(t.clientX-DG.sx)>12||Math.abs(t.clientY-DG.sy)>12)clearTimeout(DG.timer);
    if(!DG.on)return;
    e.preventDefault();
    if(DG.ghost){DG.ghost.style.left=(t.clientX-110)+'px';DG.ghost.style.top=(t.clientY-22)+'px';}
    document.querySelectorAll('.day-card').forEach(c=>{
      const r=c.getBoundingClientRect();
      c.classList.toggle('drop-over',t.clientY>=r.top&&t.clientY<=r.bottom);
    });
  },{passive:false});
  document.addEventListener('touchend',e=>{
    clearTimeout(DG.timer);
    if(!DG.on){DG.on=false;return;}
    DG.on=false;
    if(DG.ghost){DG.ghost.remove();DG.ghost=null;}
    if(DG.srcEl)DG.srcEl.classList.remove('dragging');
    const t=e.changedTouches[0];let tgt=null;
    document.querySelectorAll('.day-card').forEach(c=>{
      const r=c.getBoundingClientRect();
      if(t.clientY>=r.top&&t.clientY<=r.bottom)tgt=c.id.replace('dc-','');
      c.classList.remove('droppable','drop-over');
    });
    if(tgt&&tgt!==DG.did)moveAct(DG.did,DG.aid,DG.act,tgt);
  });
  box.addEventListener('dragstart',e=>{
    const row=e.target.closest('.act-row');if(!row)return;
    e.dataTransfer.setData('dnd',JSON.stringify({did:row.dataset.did,aid:row.dataset.aid}));
    setTimeout(()=>row.classList.add('dragging'),0);
  });
  box.addEventListener('dragend',e=>{
    e.target.closest&&e.target.closest('.act-row')?.classList.remove('dragging');
    document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('drop-over'));
  });
  box.addEventListener('dragover',e=>{
    const card=e.target.closest('.day-card');if(!card)return;
    e.preventDefault();
    document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('drop-over'));
    card.classList.add('drop-over');
  });
  box.addEventListener('drop',e=>{
    const card=e.target.closest('.day-card');if(!card)return;
    e.preventDefault();card.classList.remove('drop-over');
    try{const{did,aid}=JSON.parse(e.dataTransfer.getData('dnd'));const tgt=card.id.replace('dc-','');if(did!==tgt)DB.ref('/schedule/'+did+'/acts/'+aid).once('value',s=>{if(s.val())moveAct(did,aid,s.val(),tgt);});}catch(err){}
  });
}

const ADG={on:false,did:null,aid:null,srcEl:null};
function initActDnD(){
  const box=document.getElementById('schedBox');
  box.addEventListener('dragstart',e=>{
    const handle=e.target.closest('.act-handle');
    const row=e.target.closest('.act-row');
    if(!handle||!row)return;
    ADG.on=true;ADG.did=row.dataset.did;ADG.aid=row.dataset.aid;ADG.srcEl=row;
    e.dataTransfer.setData('actdnd',JSON.stringify({did:row.dataset.did,aid:row.dataset.aid}));
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>row.classList.add('dragging'),0);
  });
  box.addEventListener('dragend',e=>{
    ADG.on=false;
    e.target.closest&&e.target.closest('.act-row')?.classList.remove('dragging');
    document.querySelectorAll('.act-row.drag-over-act').forEach(r=>r.classList.remove('drag-over-act'));
  });
  box.addEventListener('dragover',e=>{
    if(!ADG.on)return;
    const row=e.target.closest('.act-row');
    if(!row||row===ADG.srcEl||row.dataset.did!==ADG.did)return;
    e.preventDefault();e.dataTransfer.dropEffect='move';
    document.querySelectorAll('.act-row.drag-over-act').forEach(r=>r.classList.remove('drag-over-act'));
    row.classList.add('drag-over-act');
  });
  box.addEventListener('drop',e=>{
    if(!ADG.on)return;
    const tgtRow=e.target.closest('.act-row');
    if(!tgtRow||tgtRow===ADG.srcEl||tgtRow.dataset.did!==ADG.did){ADG.on=false;return;}
    e.preventDefault();e.stopPropagation();
    const did=ADG.did;
    const dayCard=document.getElementById('dc-'+did);
    const rows=[...dayCard.querySelectorAll('.act-row')];
    const srcIdx=rows.findIndex(r=>r.dataset.aid===ADG.aid);
    const tgtIdx=rows.findIndex(r=>r.dataset.aid===tgtRow.dataset.aid);
    if(srcIdx<0||tgtIdx<0||srcIdx===tgtIdx){ADG.on=false;return;}
    const aids=rows.map(r=>r.dataset.aid);
    aids.splice(srcIdx,1);aids.splice(tgtIdx,0,ADG.aid);
    const updates={};
    aids.forEach((a,i)=>updates['/schedule/'+did+'/acts/'+a+'/order']=i);
    DB.ref('/').update(updates);
    ADG.on=false;
  });
}

function moveAct(fromDid,aid,act,toDid){

function renderSched(sched){

  const days=Object.entries(sched).sort((a,b)=>(parseInt(a[0].replace(/\D/g,''))||0)-(parseInt(b[0].replace(/\D/g,''))||0));
  if(!days.length){box.innerHTML='<div class="empty"><div class="empty-i">📅</div><div class="empty-h">尚無行程</div></div>';return;}
  box.innerHTML=days.map(([did,day])=>{
    const acts=Object.entries(day.acts||{}).sort((a,b)=>{
      const oa=a[1].order!=null?a[1].order:999999;
      const ob=b[1].order!=null?b[1].order:999999;
      if(oa!==ob)return oa-ob;
      return(a[1].time||'').localeCompare(b[1].time||'');
    });
    const dayN=did.replace(/\D/g,'');
    const wInfo=weatherByDate.get(day.date);
    const wChip=wInfo?`<span class="wchip">${wInfo.icon} ${wInfo.temp}°C ${wInfo.desc}</span>`:'';
    const spend=calcDaySpend(lastExps,day.date);
    const sChips=[...spend.entries()].map(([cur,tot])=>{
      const sym=cur==='JPY'?'¥':'NT$';
      const ico='💴';
      return`<span class="schip">${ico} ${sym}${Math.round(tot).toLocaleString('zh-TW')} ${cur}</span>`;
    }).join('');
    const metaRow=(wChip||sChips)?`<div class="day-meta">${wChip}${sChips}</div>`:'';
    return `<div class="day-card" id="dc-${did}">
      <div class="day-hdr" onclick="toggleDay('${did}')">
        <div class="day-info">
          <div class="day-tit"><span class="day-num">Day ${dayN}</span><span class="day-date-badge">${fmtDayBadge(day.date)}</span><button class="day-eb" onclick="event.stopPropagation();openDayM('${did}','${esc(day.label||'')}')">✎</button></div>
          ${(day.label&&!/^Day\s*\d+$/i.test(day.label.trim()))?`<div class="day-dt">${esc(day.label)}</div>`:''}
          ${metaRow}
        </div>
        <div class="day-chev">›</div>
      </div>
      <div class="day-body">
        ${!acts.length?'<div style="padding:14px 16px;color:var(--muted);font-size:14px;text-align:center">尚無活動</div>':
          acts.map(([aid,act])=>{
            const ac=ACTM[act.cat]||ACTM.other;
            const mapUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(act.loc||'');
            const sym=(act.cost?.cur||'JPY')==='JPY'?'¥':'NT$';
            const dp=0;
            return `<div class="act-row" draggable="true" data-did="${did}" data-aid="${aid}">
              <div class="act-handle" data-did="${did}" data-aid="${aid}">⠿</div>
              <div class="act-ico" style="background:${ac.bg}">${ac.ico}</div>
              <div class="act-body">
                ${act.time?`<div class="act-time">⏰ ${act.time}</div>`:''}
                <div class="act-name">${esc(act.name||'')}</div>
                ${act.loc?`<div class="act-loc"><a href="${mapUrl}" target="_blank">📍 ${esc(act.loc)}</a></div>`:''}
                ${act.note?`<div class="act-note-t">💬 ${esc(act.note)}</div>`:''}
                ${act.cost?.amt>0?`<div class="act-cost">💰 ${sym}${parseFloat(act.cost.amt).toFixed(dp)} ${act.cost.cur||'JPY'}</div>`:''}
              </div>
              <div class="act-btns">
                <button class="ib" onclick="openActEdit('${did}','${aid}')">✎</button>
                <button class="ib" onclick="delAct('${did}','${aid}')">✕</button>
              </div>
            </div>`;
          }).join('')
        }
        <div class="day-add" onclick="openActM('${did}')">＋ 新增活動</div>
      </div>
    </div>`;
  }).join('');
  openDays.forEach(did=>{const el=document.getElementById('dc-'+did);if(el)el.classList.add('open');});
}

function calcBal(exps,cur){
  let p1p=0,p2p=0,p1s=0,p2s=0;
  Object.values(exps).filter(e=>(e.cur||'JPY')===cur).forEach(e=>{
    const a=e.amt||0;
    if(e.paidBy===CFG.p1)p1p+=a;else p2p+=a;
    if(e.split==='p1')p1s+=a;else if(e.split==='p2')p2s+=a;else{p1s+=a/2;p2s+=a/2;}
  });
  return{p1p,p2p,total:p1p+p2p,settle:p1p-p1s};
}

function calcDaySpend(exps,dateStr){
  const totals=new Map();
  Object.values(exps).forEach(e=>{
    if(e.date!==dateStr)return;
    const cur=e.cur||'JPY';
    totals.set(cur,(totals.get(cur)||0)+(e.amt||0));
  });
  totals.forEach((v,k)=>{if(v<=0)totals.delete(k);});
  return totals;
}

function calcPersonSpend(exps,who){
  const totals=new Map();
  Object.values(exps).forEach(e=>{
    const cur=e.cur||'JPY',amt=e.amt||0;
    let myAmt=0;
    if(e.split==='p1'&&who===CFG.p1)myAmt=amt;
    else if(e.split==='p2'&&who===CFG.p2)myAmt=amt;
    else if(e.split==='both')myAmt=amt/2;
    if(myAmt>0)totals.set(cur,(totals.get(cur)||0)+myAmt);
  });
  return totals;
}

// Pie chart
function drawDonut(canvasId,exps,cur){
  const canvas=document.getElementById(canvasId);if(!canvas)return null;
  const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const rate=exchRate||21.5,isCombined=cur==='combined';
  const totals={};
  Object.values(exps).forEach(e=>{
    if(!isCombined&&(e.cur||'JPY')!==cur)return;
    const cat=e.cat||'other';
    let amt=e.amt||0;
    if(isCombined)amt=(e.cur==='TWD')?amt:amt*rate;
    totals[cat]=(totals[cat]||0)+amt;
  });
  const entries=Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!total)return null;
  const cx=w/2,cy=h/2,r=Math.min(w,h)/2-6,ir=r*0.52;
  let angle=-Math.PI/2;
  entries.forEach(([cat,val])=>{
    const slice=(val/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=PCOL[cat]||'#94A3B8';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,ir,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  const sym=(cur==='JPY')?'¥':'NT$',dp=0;
  const dispTotal=isCombined?total.toFixed(0):total.toFixed(dp);
  ctx.fillStyle='#1A1A2E';ctx.textAlign='center';
  ctx.font='bold 11px sans-serif';ctx.fillText('總計',cx,cy-7);
  ctx.font='bold 13px sans-serif';ctx.fillText(sym+dispTotal,cx,cy+9);
  return{entries,total};
}

function renderPie(exps){
  const hasJPY=Object.values(exps).some(e=>(e.cur||'JPY')==='JPY'&&(e.amt||0)>0);
  const hasTWD=Object.values(exps).some(e=>e.cur==='TWD'&&(e.amt||0)>0);
  if(!hasJPY&&!hasTWD){document.getElementById('pieSec').innerHTML='';return;}

  // Ensure curPieCur is valid
  if(curPieCur==='JPY'&&!hasJPY)curPieCur=hasTWD?'TWD':'combined';
  if(curPieCur==='TWD'&&!hasTWD)curPieCur=hasJPY?'JPY':'combined';

  const tabs=[];
  if(hasJPY)tabs.push({k:'JPY',label:'🇯🇵 JPY',cls:''});
  if(hasTWD)tabs.push({k:'TWD',label:'🇹🇼 TWD',cls:'twd'});
  if(hasJPY&&hasTWD)tabs.push({k:'combined',label:'合計(TWD)',cls:'twd'});

  document.getElementById('pieSec').innerHTML=`<div class="pie-card">
    <div class="pie-hdr">
      <span class="pie-title">支出分布</span>
      <div class="pie-tabs">${tabs.map(t=>`<div class="pie-tab ${t.cls} ${curPieCur===t.k?'on':''}" onclick="switchPie('${t.k}')">${t.label}</div>`).join('')}</div>
    </div>
    <div class="pie-body">
      <canvas id="pieCanvas" width="140" height="140" style="flex-shrink:0"></canvas>
      <div class="pie-legend" id="pieLegend"></div>
    </div>
    <div class="pie-rate" id="pieRate">${exchRate?`即時匯率 1 JPY ≈ NT$${exchRate.toFixed(4)}（台灣銀行參考）`:''}</div>
  </div>`;

  const result=drawDonut('pieCanvas',exps,curPieCur);
  if(!result)return;
  const{entries,total}=result;
  const sym=(curPieCur==='JPY')?'¥':'NT$',dp=0;
  document.getElementById('pieLegend').innerHTML=entries.map(([cat,val])=>{
    const c=CATM[cat]||CATM.other;
    const pct=((val/total)*100).toFixed(0);
    const dispVal=(curPieCur==='combined')?val.toFixed(0):val.toFixed(dp);
    return`<div class="pie-leg-row">
      <div class="pie-dot" style="background:${PCOL[cat]||'#94A3B8'}"></div>
      <span class="pie-cat">${c.ico} ${c.name}</span>
      <span class="pie-amt">${sym}${dispVal}</span>
      <span class="pie-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function switchPie(cur){curPieCur=cur;renderPie(lastExps);}

function renderStat(exps){
  renderPie(exps);
  const p1=calcPersonSpend(exps,CFG.p1),p2=calcPersonSpend(exps,CFG.p2);
  const fmtTotals=m=>[...m.entries()].map(([cur,tot])=>`<div style="font-size:20px;font-weight:800">${cur==='JPY'?'¥':'NT$'}${Math.round(tot).toLocaleString('zh-TW')}</div><div style="font-size:11px;color:var(--muted)">${cur}</div>`).join('')||'<div style="color:var(--muted);font-size:13px">無記錄</div>';
  document.getElementById('personSec').innerHTML=`
    <div class="card" style="display:flex;gap:0;padding:0;overflow:hidden;margin-bottom:10px">
      <div style="flex:1;padding:16px;border-right:1px solid var(--border)">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">${esc(CFG.p1)}</div>
        ${fmtTotals(p1)}
      </div>
      <div style="flex:1;padding:16px">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">${esc(CFG.p2)}</div>
        ${fmtTotals(p2)}
      </div>
    </div>`;
}

function renderExp(exps){
  const balSec=document.getElementById('balSec'),expList=document.getElementById('expList');
  const entries=Object.entries(exps);
  if(!entries.length){
    balSec.innerHTML='';
    expList.innerHTML='<div class="empty"><div class="empty-i">💰</div><div class="empty-h">尚無支出紀錄</div><div class="empty-s">點 ＋ 新增支出</div></div>';
    return;
  }
  const jpy=calcBal(exps,'JPY'),twd=calcBal(exps,'TWD');

  const balRow=(b,cur,rowCls)=>{
    if(b.total<=0)return'';
    const sym=cur==='JPY'?'¥':'NT$',dp=0;
    const sAmt=Math.abs(b.settle);
    const settleHtml=sAmt>0.005
      ?`<span class="bc-settle">${b.settle>0?esc(CFG.p2)+'→'+esc(CFG.p1):esc(CFG.p1)+'→'+esc(CFG.p2)} ${sym}${sAmt.toFixed(dp)}</span>`
      :`<span class="bc-settle ok">✅ 結清</span>`;
    return`<div class="bc-row ${rowCls}">
      <div>
        <span class="bc-flag">${cur==='JPY'?'🇯🇵':'🇹🇼'}</span><span class="bc-tot">${sym}${b.total.toFixed(dp)}</span>
        <div class="bc-ps">${esc(CFG.p1)} ${sym}${b.p1p.toFixed(dp)} &nbsp;·&nbsp; ${esc(CFG.p2)} ${sym}${b.p2p.toFixed(dp)}</div>
      </div>
      ${settleHtml}
    </div>`;
  };

  balSec.innerHTML=`<div class="bc-card">${balRow(jpy,'JPY','')}${balRow(twd,'TWD','twd-row')}</div>`;

  // Expense list
  const groups={};
  entries.forEach(([id,e])=>{const d=e.date||'';(groups[d]=groups[d]||[]).push([id,e]);});
  expList.innerHTML=Object.keys(groups).sort().reverse().map(date=>`
    <div class="edl">${fmtD(date)}</div>`+
    groups[date].map(([id,e])=>{
      const cat=CATM[e.cat]||CATM.other,isP1=e.paidBy===CFG.p1;
      const slbl=e.split==='both'?'均分':e.split==='p1'?esc(CFG.p1)+'自付':esc(CFG.p2)+'自付';
      const sym=(e.cur||'JPY')==='JPY'?'¥':'NT$',dp=0;
      return`<div class="er">
        <div class="ei" style="background:${cat.bg}">${cat.ico}</div>
        <div class="einfo">
          <div class="edesc">${esc(e.desc||'')}</div>
          <div class="emeta">
            <span class="bdg ${isP1?'bp1':'bp2'}">${esc(e.paidBy)}</span>
            <span class="bdg ${(e.cur||'JPY')==='JPY'?'baud':'btwd'}">${e.cur||'JPY'}</span>
            ${e.fromAct?'<span class="bdg bact">📅行程</span>':''}
            ${slbl}
          </div>
        </div>
        <div class="eright">
          <div class="eamt">${sym}${(e.amt||0).toFixed(dp)}</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px">
            <button class="ib" onclick="openExpEdit('${id}')">✎</button>
            <button class="ib" onclick="delExp('${id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')
  ).join('');
}

// ─── Notes ───────────────────────────────────────────
function selNT(t){curNT=t;document.getElementById('nt-txt').classList.toggle('on',t==='text');document.getElementById('nt-chk').classList.toggle('on',t==='check');document.getElementById('ntg-txt').style.display=t==='text'?'block':'none';document.getElementById('ntg-chk').style.display=t==='check'?'block':'none';}
function addCLI(txt=''){const con=document.getElementById('clItems'),div=document.createElement('div');div.className='cer';const iid='ci'+uid();div.innerHTML=`<input id="${iid}" placeholder="待辦項目" value="${esc(txt)}"><button class="ib" onclick="this.parentElement.remove()">✕</button>`;con.appendChild(div);document.getElementById(iid).focus();}
function openNoteM(){document.getElementById('m-note-t').textContent='新增筆記';document.getElementById('mn-id').value='';document.getElementById('n_title').value='';document.getElementById('n_content').value='';document.getElementById('clItems').innerHTML='';document.getElementById('imgPr').style.display='none';document.getElementById('imgPh').style.display='block';document.getElementById('imgFile').value='';curImg=null;selNT('text');openM('m-note');setTimeout(()=>document.getElementById('n_title').focus(),280);}
function openNoteEdit(nid){
  DB.ref('/notes/'+nid).once('value',snap=>{
    const n=snap.val();if(!n)return;
    document.getElementById('m-note-t').textContent='編輯筆記';document.getElementById('mn-id').value=nid;
    document.getElementById('n_title').value=n.title||'';document.getElementById('n_content').value=n.content||'';
    document.getElementById('clItems').innerHTML='';(n.items||[]).forEach(i=>addCLI(i.text||''));
    if(n.img){curImg=n.img;const p=document.getElementById('imgPr');p.src=n.img;p.style.display='block';document.getElementById('imgPh').style.display='none';}
    else{curImg=null;document.getElementById('imgPr').style.display='none';document.getElementById('imgPh').style.display='block';}
    selNT(n.type||'text');openM('m-note');
  });
}
function onImgPick(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const ratio=Math.min(900/img.width,1);c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);curImg=c.toDataURL('image/jpeg',.78);const p=document.getElementById('imgPr');p.src=curImg;p.style.display='block';document.getElementById('imgPh').style.display='none';};img.src=e.target.result;};r.readAsDataURL(f);}
function saveNote(){
  const title=document.getElementById('n_title').value.trim();if(!title){toast('請輸入標題');return;}
  const nid=document.getElementById('mn-id').value||('n'+uid()),isNew=!document.getElementById('mn-id').value;
  const note={title,type:curNT,img:curImg||null,updAt:new Date().toISOString(),...(isNew&&{crAt:new Date().toISOString()})};
  if(curNT==='text'){note.content=document.getElementById('n_content').value.trim();note.items=null;}
  else{note.content=null;const inputs=document.querySelectorAll('#clItems .cer input');note.items=Array.from(inputs).map(i=>({text:i.value.trim(),done:false})).filter(i=>i.text);}
  if(!isNew&&curNT==='check'){DB.ref('/notes/'+nid+'/items').once('value',snap=>{const old=snap.val()||[];note.items=note.items.map((item,i)=>({...item,done:(old[i]&&old[i].text===item.text)?(old[i].done||false):false}));DB.ref('/notes/'+nid).update(note).then(()=>{closeM('m-note');toast('✅ 已儲存');});});return;}
  sync(true);DB.ref('/notes/'+nid).set(note).then(()=>{sync(false);closeM('m-note');toast('✅ 已儲存');}).catch(()=>{sync(false);toast('⚠️ 儲存失敗');});
}
function delNote(nid){if(!confirm('確定刪除？'))return;DB.ref('/notes/'+nid).remove().then(()=>toast('🗑️ 已刪除'));}
function toggleCLI(nid,idx){const r=DB.ref('/notes/'+nid+'/items/'+idx+'/done');r.once('value',s=>r.set(!s.val()));}
function renderNotes(notes){
  const el=document.getElementById('notesList');
  const entries=Object.entries(notes).sort((a,b)=>(b[1].updAt||b[1].crAt||'').localeCompare(a[1].updAt||a[1].crAt||''));
  if(!entries.length){el.innerHTML='<div class="empty"><div class="empty-i">📝</div><div class="empty-h">尚無筆記</div><div class="empty-s">點 ＋ 新增筆記</div></div>';return;}
  el.innerHTML=entries.map(([id,n])=>{
    let body='';
    if(n.type==='check'&&n.items){const dn=n.items.filter(i=>i.done).length;body=`<div style="margin-top:6px">${n.items.slice(0,5).map((item,i)=>`<div class="clr" onclick="toggleCLI('${id}',${i})"><div class="clc ${item.done?'done':''}"></div><span class="clt ${item.done?'done':''}">${esc(item.text)}</span></div>`).join('')}${n.items.length>5?`<div style="font-size:12px;color:var(--muted);margin-top:3px">還有 ${n.items.length-5} 項…</div>`:''}</div><div class="clp">${dn}/${n.items.length} 完成</div>`;}
    else if(n.content)body=`<div class="np">${esc(n.content.slice(0,120)+(n.content.length>120?'…':''))}</div>`;
    return`<div class="nc"><div class="nh"><div class="nt2">${esc(n.title||'')}</div><div class="na"><button class="ib" onclick="openNoteEdit('${id}')">✎</button><button class="ib" onclick="delNote('${id}')">✕</button></div></div>${body}${n.img?`<img src="${n.img}" class="nimg" loading="lazy">`:''}  <div class="nd">${n.updAt?fmtDt(n.updAt):''}</div></div>`;
  }).join('');
}

// ─── Settings ────────────────────────────────────────
function saveCfg(){
  CFG.title=document.getElementById('c_title').value.trim()||CFG.title;
  CFG.p1=document.getElementById('c_p1').value.trim()||CFG.p1;
  CFG.p2=document.getElementById('c_p2').value.trim()||CFG.p2;
  const newStart=document.getElementById('c_start').value||CFG.start;
  const dateChanged=newStart!==CFG.start;
  CFG.start=newStart;CFG.days=parseInt(document.getElementById('c_days').value)||CFG.days;
  CFG.photo=document.getElementById('c_photo').value.trim();
  const newCity=document.getElementById('c_city').value||CFG.city;
  if(newCity!==CFG.city){CFG.city=newCity;const coords=CITIES[newCity]||{lat:35.68,lng:139.69};CFG.lat=coords.lat;CFG.lng=coords.lng;}
  CFG.geminiKey=document.getElementById('c_gemini').value.trim()||CFG.geminiKey;
  const ph=document.getElementById('hdrPhoto');
  if(CFG.photo){ph.src=CFG.photo;ph.style.display='';}else{ph.style.display='none';}
  localStorage.setItem('japan_trip',JSON.stringify(CFG));
  document.getElementById('appTitle').textContent=CFG.title;
  ['pb1','apb1'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=CFG.p1;});
  ['pb2','apb2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=CFG.p2;});
  document.getElementById('sp-p1').textContent=CFG.p1+'自付';document.getElementById('sp-p2').textContent=CFG.p2+'自付';
  document.getElementById('asp-p1').textContent=CFG.p1+'自付';document.getElementById('asp-p2').textContent=CFG.p2+'自付';
  if(dateChanged)fixDates(false);
  toast('✅ 設定已儲存'+(dateChanged?' · 行程日期已更新':''));
}
function changeFB(){if(!confirm('變更 Firebase 將重新載入，確定？'))return;localStorage.removeItem('japan_trip');location.reload();}
function clearAll(){if(!confirm('⚠️ 確定清空所有資料？'))return;if(!confirm('再次確認：清空全部？'))return;DB.ref('/').set({schedule:{},expenses:{},notes:{}}).then(()=>toast('✅ 已清空'));}
</script>
