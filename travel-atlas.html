<style>
:root{
  --bg:#0B1220;--bg2:#0E1830;--card:rgba(255,255,255,.06);--card-solid:#152238;
  --text:#EAF0FB;--muted:#8CA0C4;--border:rgba(255,255,255,.10);
  --teal:#4ADE80;--teal2:#22C55E;--gold:#F4C95D;--red:#F87171;
  --tab-h:60px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* Setup */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:28px 20px;background:linear-gradient(160deg,#0B1220,#132038 60%,#0E2A28);}
#setup h1{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center;}
#setup p{font-size:14px;color:var(--muted);margin-bottom:26px;text-align:center;}
.scard{background:var(--card-solid);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:420px;}
.hint{font-size:11px;color:var(--muted);margin-top:10px;text-align:center;line-height:1.6;}

/* App */
#app{display:none;flex-direction:column;height:100dvh;}
.hdr{position:relative;height:64px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg2);}
.hdr-t{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;color:#fff;}
.hdr-s{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-left:10px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
.dot.busy{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);user-select:none;transition:color .15s;}
.ti.on{color:var(--teal);}.ti-i{font-size:22px;line-height:1;}.ti-l{font-size:10px;font-weight:600;}
.page{display:none;}.page.on{display:block;}
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 14px);right:16px;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:var(--teal);color:#0B1220;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(74,222,128,.35);z-index:99;transition:transform .12s;}
.fab:active{transform:scale(.9);}

/* Shared */
.bx{padding:12px 16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;backdrop-filter:blur(6px);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-b{background:var(--teal);color:#0B1220;}.btn-g{background:rgba(255,255,255,.08);color:var(--text);}.btn-r{background:var(--red);color:#fff;}.btn-w{width:100%;}
.ib{width:28px;height:28px;border-radius:7px;border:none;background:rgba(255,255,255,.08);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.fg{margin-bottom:14px;}
.lb{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.inp,.ta{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:rgba(255,255,255,.04);color:var(--text);outline:none;transition:border-color .2s;}
.inp::placeholder,.ta::placeholder{color:var(--muted);}
.inp:focus,.ta:focus{border-color:var(--teal);}
.ta{resize:none;min-height:72px;}
.fr{display:flex;gap:10px;}.fr .fg{flex:1;}
.tw{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;gap:3px;}
.to{flex:1;padding:8px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;}
.to.on{background:var(--teal);color:#0B1220;}
.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-i{font-size:46px;margin-bottom:12px;}.empty-h{font-size:16px;font-weight:600;color:var(--text);}.empty-s{font-size:14px;margin-top:4px;}
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 70px);left:50%;transform:translateX(-50%);background:rgba(20,30,50,.92);border:1px solid var(--border);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;}
.ov.open{display:flex;}
.sheet{background:var(--card-solid);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:93dvh;overflow-y:auto;padding:16px 20px calc(20px + var(--safe-b));animation:up .22s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.hdl{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.st{font-size:18px;font-weight:700;margin-bottom:18px;}
.stat-row{display:flex;gap:10px;margin-bottom:12px;}
.stat{flex:1;text-align:center;}
.stat-n{font-size:24px;font-weight:800;color:var(--text);}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.map-wrap{position:relative;border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);background:radial-gradient(ellipse at center,#0E2A3A,#081120);}
.map-wrap canvas{display:block;width:100%;aspect-ratio:1;touch-action:none;}
.map-tip{position:absolute;background:rgba(10,20,35,.92);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;color:#fff;cursor:pointer;transform:translate(-50%,-120%);white-space:nowrap;display:none;}
.map-zoom-ctl{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(10,20,35,.7);border:1px solid var(--border);border-radius:10px;padding:6px;}
.map-zoom-ctl .ib{background:rgba(255,255,255,.1);color:#fff;}
.map-zoom-lbl{font-size:10px;color:var(--muted);}
.chart-row{display:flex;gap:10px;}
.chart-card{flex:1;}
.chart-card canvas{width:100%;display:block;aspect-ratio:1;}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:4px;}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;}
.filter-pill.on{background:var(--teal);color:#0B1220;border-color:var(--teal);}
.trip-row{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer;}
.trip-flag{font-size:22px;flex-shrink:0;}
.trip-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.trip-info{flex:1;min-width:0;}
.trip-title{font-weight:700;font-size:15px;}
.trip-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.view-toggle{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.view-toggle-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.view-toggle-btn.on{background:var(--teal);color:#0B1220;border-color:var(--teal);}
.trip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.trip-card{cursor:pointer;padding:0;overflow:hidden;}
.trip-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.trip-card-flag{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--bg2);}
.trip-card-body{padding:10px 12px 12px;}
.trip-card-title{font-weight:700;font-size:14px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trip-card-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.detail-cover{position:relative;height:180px;border-radius:16px;background:linear-gradient(150deg,var(--bg2),#0E2A3A);background-size:cover;background-position:center;margin-bottom:12px;display:flex;align-items:flex-end;padding:16px;border:1px solid var(--border);}
.detail-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6);}
.detail-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
.tag-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(74,222,128,.15);color:var(--teal);margin:0 6px 6px 0;}
.entry-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06);}
.entry-thumb-wrap{position:relative;flex-shrink:0;}
.entry-thumb-badge{position:absolute;bottom:-3px;right:-3px;background:var(--teal);color:#0B1220;font-size:9px;font-weight:700;border-radius:6px;padding:1px 5px;line-height:1.3;}
.entry-info{flex:1;min-width:0;}
.entry-loc{font-size:12px;color:var(--teal);font-weight:700;}
.entry-text{font-size:13px;color:var(--text);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.day-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.day-card-title{font-size:13px;font-weight:700;color:var(--text);}
.day-loc{font-size:11px;color:var(--gold);font-weight:600;margin-top:3px;cursor:pointer;}
.day-card-actions{display:flex;align-items:center;gap:6px;}
.day-chev{color:var(--muted);font-size:16px;}
.day-card-body{border-top:1px solid var(--border);padding:8px 10px;}
.entry-row2{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--border);transition:opacity .15s;}
.entry-row2:last-child{border-bottom:none;}
.entry-row2.dragging{opacity:.3;}
.entry-row-main{flex:1;min-width:0;display:flex;gap:12px;cursor:pointer;touch-action:pan-y;}
.entry-del-x{width:24px;height:24px;border-radius:50%;border:none;background:rgba(248,113,113,.15);color:var(--red);font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.day-del-x{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cover-pos-preview{height:110px;border-radius:10px;background-size:cover;border:1px solid var(--border);margin-bottom:6px;}
.entry-ghost{position:fixed;background:var(--card-solid);border:1px solid var(--teal);border-radius:10px;padding:9px 4px;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:.95;}
.day-card-body.drop-over{background:rgba(74,222,128,.08);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.cover-thumb{position:relative;cursor:pointer;}
.cover-thumb img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;display:block;border:2px solid transparent;}
.cover-thumb.on img{border-color:var(--teal);}
.cover-thumb-badge{position:absolute;top:3px;right:3px;background:var(--teal);color:#0B1220;font-size:9px;font-weight:700;border-radius:6px;padding:1px 5px;}
.cover-thumb-x{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;}
</style>
</head>
<body>

<div id="setup">
  <h1>🌍 Travel Atlas</h1>
  <p>輸入 Firebase Realtime Database 網址與 Storage bucket 開始</p>
  <div class="scard">

    <button class="btn btn-b btn-w" onclick="doSetup()">開始使用 →</button>
    <p class="hint">Firebase Console → Realtime Database（測試模式）→ 複製網址；Storage → 啟用 → 複製 bucket 名稱</p>

<div id="app">

<script>
let CFG={},DB=null,STORAGE=null,curTab='atlas',curDetailTripId=null;

// ─── Utils ───────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function sync(on){document.getElementById('syncDot').className='dot'+(on?' busy':'');document.getElementById('syncTxt').textContent=on?'同步中…':'已同步';}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.ov').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
});

// ─── Setup / Boot ────────────────────────────────────
function doSetup(){
  const url=document.getElementById('s_url').value.trim();
  const bucket=document.getElementById('s_bucket').value.trim();
  if(!url){alert('請輸入 Firebase 資料庫網址');return;}
  if(!bucket){alert('請輸入 Storage bucket');return;}
  CFG={url,bucket};
  localStorage.setItem('travel_atlas_cfg',JSON.stringify(CFG));
  bootApp();
}
window.onload=()=>{
  const s=localStorage.getItem('travel_atlas_cfg');
  if(s){CFG=JSON.parse(s);bootApp();}
};
function bootApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('c_url').value=CFG.url;
  document.getElementById('c_bucket').value=CFG.bucket;
  connectFB();
}
function changeFB(){
  const url=document.getElementById('c_url').value.trim();
  const bucket=document.getElementById('c_bucket').value.trim();
  if(!url||!bucket){toast('⚠️ 網址與 bucket 都要填');return;}
  CFG={url,bucket};
  localStorage.setItem('travel_atlas_cfg',JSON.stringify(CFG));
  location.reload();
}

// ─── Firebase ────────────────────────────────────────
function connectFB(){
  sync(true);
  try{
    if(!firebase.apps.length)firebase.initializeApp({databaseURL:CFG.url.trim().replace(/\/$/,''),storageBucket:CFG.bucket.trim()});
    DB=firebase.database();
    STORAGE=firebase.storage();
    outboxFlush();
    DB.ref('/trips').on('value',snap=>{
      const trips=snap.val()||{};
      onTripsUpdate(trips);
      sync(false);
    },err=>{sync(false);toast('⚠️ Firebase 錯誤：'+err.message);});
  }catch(e){sync(false);toast('⚠️ Firebase 初始化失敗');console.error(e);}
}
// Filled in by later tasks — receives the live /trips object on every change.
function onTripsUpdate(trips){
  window.__STATS__=computeStats(trips);
  renderAtlas(window.__STATS__);
  renderTripsList(window.__STATS__.trips);
}

// ─── Data layer ──────────────────────────────────────
const REGIONS=[
  {id:'east-asia',name:'東亞',color:'#4ADE80'},
  {id:'se-asia',name:'東南亞',color:'#38BDF8'},
  {id:'south-asia',name:'南亞',color:'#F472B6'},
  {id:'europe',name:'歐洲',color:'#F4C95D'},
  {id:'americas',name:'美洲',color:'#FB923C'},
  {id:'oceania',name:'大洋洲',color:'#A78BFA'},
];
const REGIONM=Object.fromEntries(REGIONS.map(r=>[r.id,r]));

function tripsRef(){return DB.ref('/trips');}
function entriesRef(tripId){return DB.ref('/trips/'+tripId+'/entries');}

function createTrip(trip){
  const id=uid();
  tripsRef().child(id).set(trip);
  return id;
}
function updateTrip(tripId,patch){tripsRef().child(tripId).update(patch);}
function deleteTrip(tripId){tripsRef().child(tripId).remove();}

function createEntry(tripId,entry){
  const id=uid();
  entriesRef(tripId).child(id).set(entry);
  return id;
}
function updateEntry(tripId,entryId,patch){entriesRef(tripId).child(entryId).update(patch);}
function deleteEntry(tripId,entryId){entriesRef(tripId).child(entryId).remove();}

// Derived stats from the live /trips snapshot object
function computeStats(trips){
  const list=Object.entries(trips||{}).map(([id,t])=>({id,...t}));
  const countries=new Set();
  list.forEach(t=>(t.countryCode||[]).forEach(c=>countries.add(c)));
  const years=list.map(t=>(t.startDate||'').slice(0,4)).filter(Boolean).map(Number);
  const startYear=years.length?Math.min(...years):new Date().getFullYear();
  const regionCounts=REGIONS.map(r=>({...r,value:list.filter(t=>t.region===r.id).length})).filter(r=>r.value>0);
  const yearCounts=[];
  const curYear=new Date().getFullYear();
  for(let y=startYear;y<=curYear;y++){
    yearCounts.push({year:y,count:list.filter(t=>Number((t.startDate||'').slice(0,4))===y).length,highlight:y===curYear});
  }
  const tagCounts={};
  list.forEach(t=>(t.tags||[]).forEach(tag=>{tagCounts[tag]=(tagCounts[tag]||0)+1;}));
  const topTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([tag,count])=>({tag,count}));
  return{trips:list,tripCount:list.length,countryCount:countries.size,startYear,regionCounts,yearCounts,topTags};
}

// ─── Atlas home ──────────────────────────────────────
function renderAtlas(stats){
  const box=document.getElementById('atlasBox');
  if(!stats.tripCount){
    box.innerHTML='<div class="empty"><div class="empty-i">🌍</div><div class="empty-h">還沒有旅程</div><div class="empty-s">點右下角 ＋ 新增第一趟旅程</div></div>';
    return;
  }
  box.innerHTML=`
    <div class="stat-row">
      <div class="stat"><div class="stat-n">${stats.tripCount}</div><div class="stat-l">趟旅行</div></div>
      <div class="stat"><div class="stat-n">${stats.countryCount}</div><div class="stat-l">個國家</div></div>
      <div class="stat"><div class="stat-n">${new Date().getFullYear()-stats.startYear+1}</div><div class="stat-l">年來</div></div>
    </div>
    <div class="map-wrap">
      <canvas id="mapCanvas" width="360" height="360"></canvas>
      <div class="map-tip" id="mapTip"></div>
      <div class="map-zoom-ctl">
        <button class="ib" onclick="mapZoom(1.5)">＋</button>
        <div class="map-zoom-lbl" id="mapZoomLabel">100%</div>
        <button class="ib" onclick="mapZoom(1/1.5)">－</button>
      </div>
    </div>
    <div class="chart-row">
      <div class="card chart-card"><div class="chart-title">地區分佈</div><canvas id="donutCanvas" width="140" height="140"></canvas>
        <div id="donutLegend"></div>
      </div>
      <div class="card chart-card"><div class="chart-title">年度足跡</div><canvas id="barCanvas" width="140" height="140"></canvas></div>
    </div>
    ${stats.topTags.length?`<div class="card"><div class="chart-title">熱門標籤</div><div class="filter-row">${
      stats.topTags.map(t=>`<div class="filter-pill" onclick="goTagFilter('${esc(t.tag)}')">${esc(t.tag)} · ${t.count}</div>`).join('')
    }</div></div>`:''}`;
  drawMap(stats.trips);
  drawDonut(document.getElementById('donutCanvas'),stats.regionCounts);
  document.getElementById('donutLegend').innerHTML=stats.regionCounts.map(r=>
    `<div class="legend-row"><span class="legend-dot" style="background:${r.color}"></span>${r.name} · ${r.value}</div>`
  ).join('');
  drawYearlyBars(document.getElementById('barCanvas'),stats.yearCounts);
}

// ─── 3D globe (three.js + real earth texture) ─────────
let globePins=[];
let globeScene=null,globeCamera=null,globeRenderer=null,globeControls=null;
let globeRaycaster=null,globePinObjects=[],globeMesh=null;
let globeAnimId=null,globeBoundCanvas=null,globeResizeTimer=null;
const GLOBE_RADIUS=1;
const GLOBE_INITIAL_DISTANCE=3.2;
const GLOBE_MIN_DISTANCE=1.4;
const GLOBE_MAX_DISTANCE=5.5;
const BORDER_MAX_EDGE_DEG=6;
let _lastZoomPct=null;

// Standard lat/lng -> Vector3 mapping that matches SphereGeometry's default
// UV unwrap for an equirectangular texture (lng -180..180 maps around the
// seam behind the +X axis). Radius 1 = unit sphere; scale via multiplyScalar
// for border/pin placement slightly above the textured surface.
function latLngToVector3(lat,lng,radius){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lng+180)*Math.PI/180;
  return new THREE.Vector3(
    -radius*Math.sin(phi)*Math.cos(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.sin(theta)
  );
}
function slerpVec3(a,b,t){
  const dot=Math.max(-1,Math.min(1,a.dot(b)));
  const theta=Math.acos(dot);
  if(theta<1e-6)return a.clone();
  const s=Math.sin(theta);
  const w1=Math.sin((1-t)*theta)/s,w2=Math.sin(t*theta)/s;
  return new THREE.Vector3(a.x*w1+b.x*w2,a.y*w1+b.y*w2,a.z*w1+b.z*w2);
}
// Densify a [lng,lat] polyline via spherical interpolation before drawing it
// as straight THREE.Line segments — without this, the chord between two
// sparse RDP-simplified points cuts inside the sphere instead of hugging its
// surface (same problem the old Canvas 2D renderer's densifyRings solved).
function densifyBorderLine(line,radius,maxEdgeDeg){
  const unit=line.map(([lng,lat])=>latLngToVector3(lat,lng,1));
  const out=[];
  for(let i=0;i<unit.length-1;i++){
    const a=unit[i],b=unit[i+1];
    out.push(a);
    const dot=Math.max(-1,Math.min(1,a.dot(b)));
    const angDeg=Math.acos(dot)*180/Math.PI;
    const steps=Math.min(48,Math.ceil(angDeg/maxEdgeDeg));
    for(let s=1;s<steps;s++)out.push(slerpVec3(a,b,s/steps));
  }
  out.push(unit[unit.length-1]);
  return out.map(p=>p.clone().multiplyScalar(radius));
}

let _pinSpriteMat=null;
function buildPinSpriteMaterial(){
  if(_pinSpriteMat)return _pinSpriteMat;
  const c=document.createElement('canvas');
  c.width=64;c.height=64;
  const cctx=c.getContext('2d');
  const g=cctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,246,221,1)');
  g.addColorStop(0.25,'rgba(244,201,93,.95)');
  g.addColorStop(1,'rgba(244,201,93,0)');
  cctx.fillStyle=g;cctx.beginPath();cctx.arc(32,32,32,0,Math.PI*2);cctx.fill();
  const tex=new THREE.CanvasTexture(c);
  _pinSpriteMat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true});
  return _pinSpriteMat;
}

function updateGlobePins(){
  if(!globeScene)return;
  globePinObjects.forEach(obj=>globeScene.remove(obj));
  globePinObjects=[];
  const mat=buildPinSpriteMaterial();
  globePins.forEach(pin=>{
    const sprite=new THREE.Sprite(mat);
    sprite.position.copy(latLngToVector3(pin.lat,pin.lng,GLOBE_RADIUS*1.02));
    sprite.scale.set(0.09,0.09,1);
    sprite.userData.pin=pin;
    globeScene.add(sprite);
    globePinObjects.push(sprite);
  });
}

function onGlobeCanvasClick(e){
  const canvas=globeBoundCanvas;
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const mouse=new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
  globeRaycaster.setFromCamera(mouse,globeCamera);
  const hits=globeRaycaster.intersectObjects(globePinObjects);
  const tip=document.getElementById('mapTip');
  if(!tip)return;
  if(hits.length){
    const pin=hits[0].object.userData.pin;
    const screenPos=hits[0].object.position.clone().project(globeCamera);
    tip.style.display='block';
    tip.style.left=((screenPos.x+1)/2*100)+'%';
    tip.style.top=((1-screenPos.y)/2*100)+'%';
    tip.textContent=pin.title;
    tip.onclick=()=>openTripDetail(pin.id);
  }else{
    tip.style.display='none';
  }
}

function onGlobeResize(){
  clearTimeout(globeResizeTimer);
  globeResizeTimer=setTimeout(()=>{
    const canvas=globeBoundCanvas;
    if(!canvas||!globeRenderer)return;
    const rect=canvas.getBoundingClientRect();
    if(!rect.width)return;
    globeCamera.aspect=rect.width/rect.height;
    globeCamera.updateProjectionMatrix();
    globeRenderer.setSize(rect.width,rect.height,false);
  },150);
}

// The source daymap's ocean is a flat, muted grey-blue with no seafloor
// detail. Composite a separately precomputed bathymetry-shaded texture
// (assets/ocean_bathymetry.jpg — hillshaded NOAA ETOPO1 depth data, deep
// trenches darker / mid-ocean ridges lighter) onto just the ocean pixels
// (blue-dominant in the daymap) so the water shows real depth variation.
// Land pixels are left untouched. Runs once when both images finish
// loading (not per frame), so the per-pixel cost doesn't affect the render
// loop.
function loadEarthTextureWithBathymetry(dayUrl,bathyUrl,onLoad,onError){
  const dayImg=new Image(),bathyImg=new Image();
  let loaded=0,failed=false;
  const onErr=()=>{if(!failed){failed=true;onError();}};
  const tryFinish=()=>{
    loaded++;
    if(loaded<2||failed)return;
    const c=document.createElement('canvas');
    c.width=dayImg.naturalWidth;c.height=dayImg.naturalHeight;
    const cctx=c.getContext('2d');
    cctx.drawImage(dayImg,0,0);
    const dayData=cctx.getImageData(0,0,c.width,c.height);
    const bc=document.createElement('canvas');
    bc.width=c.width;bc.height=c.height;
    const bctx=bc.getContext('2d');
    bctx.drawImage(bathyImg,0,0,c.width,c.height);
    const bathyData=bctx.getImageData(0,0,c.width,c.height);
    const d=dayData.data,bd=bathyData.data;
    for(let i=0;i<d.length;i+=4){
      const r=d[i],g=d[i+1],b=d[i+2];
      if(b>r&&b>g&&b>=60){
        d[i]=bd[i];d[i+1]=bd[i+1];d[i+2]=bd[i+2];
      }
    }
    cctx.putImageData(dayData,0,0);
    onLoad(new THREE.CanvasTexture(c));
  };
  dayImg.crossOrigin='anonymous';bathyImg.crossOrigin='anonymous';
  dayImg.onload=tryFinish;bathyImg.onload=tryFinish;
  dayImg.onerror=onErr;bathyImg.onerror=onErr;
  dayImg.src=dayUrl;bathyImg.src=bathyUrl;
}

function initGlobeScene(canvas){
  if(globeAnimId){cancelAnimationFrame(globeAnimId);globeAnimId=null;}
  if(globeRenderer){globeRenderer.dispose();}
  globeScene=new THREE.Scene();
  const rect=canvas.getBoundingClientRect();
  const aspect=(rect.width||1)/(rect.height||1);
  globeCamera=new THREE.PerspectiveCamera(45,aspect,0.1,100);
  globeCamera.position.set(0,0,GLOBE_INITIAL_DISTANCE);
  globeRenderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  globeRenderer.setPixelRatio(window.devicePixelRatio||1);
  globeRenderer.setSize(rect.width||canvas.clientWidth||360,rect.height||canvas.clientHeight||360,false);

  const geo=new THREE.SphereGeometry(GLOBE_RADIUS,64,64);
  globeMesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x14314a}));
  globeScene.add(globeMesh);
  loadEarthTextureWithBathymetry(
    'assets/2k_earth_daymap.jpg',
    'assets/ocean_bathymetry.jpg',
    tex=>{globeMesh.material=new THREE.MeshBasicMaterial({map:tex});},
    ()=>{/* keep the placeholder navy sphere on load failure */}
  );

  const borderGroup=new THREE.Group();
  BORDERS.forEach(line=>{
    const pts=densifyBorderLine(line,GLOBE_RADIUS*1.001,BORDER_MAX_EDGE_DEG);
    const geom=new THREE.BufferGeometry().setFromPoints(pts);
    const mat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.35});
    borderGroup.add(new THREE.Line(geom,mat));
  });
  globeScene.add(borderGroup);

  globeControls=new OrbitControls(globeCamera,globeRenderer.domElement);
  globeControls.enablePan=false;
  globeControls.enableDamping=true;
  globeControls.dampingFactor=0.1;
  globeControls.minDistance=GLOBE_MIN_DISTANCE;
  globeControls.maxDistance=GLOBE_MAX_DISTANCE;
  globeControls.rotateSpeed=0.5;

  globeRaycaster=new THREE.Raycaster();
  canvas.addEventListener('click',onGlobeCanvasClick);
  window.addEventListener('resize',onGlobeResize);

  function animate(){
    globeAnimId=requestAnimationFrame(animate);
    globeControls.update();
    globeRenderer.render(globeScene,globeCamera);
    const dist=globeCamera.position.distanceTo(globeControls.target);
    const pct=Math.round((GLOBE_INITIAL_DISTANCE/dist)*100);
    if(pct!==_lastZoomPct){
      _lastZoomPct=pct;
      const lbl=document.getElementById('mapZoomLabel');
      if(lbl)lbl.textContent=pct+'%';
    }
  }
  animate();
}

function drawMap(trips){
  globePins=trips.filter(t=>t.lat!=null&&t.lng!=null).map(t=>({lat:t.lat,lng:t.lng,title:t.title,id:t.id}));
  if(!window.THREE||!window.OrbitControls){
    window.addEventListener('three-ready',()=>drawMap(trips),{once:true});
    return;
  }
  const canvas=document.getElementById('mapCanvas');
  if(!canvas)return;
  if(canvas!==globeBoundCanvas){
    initGlobeScene(canvas);
    globeBoundCanvas=canvas;
  }
  updateGlobePins();
}

function mapZoom(factor){
  if(!globeControls||!globeCamera)return;
  const dir=new THREE.Vector3().subVectors(globeCamera.position,globeControls.target);
  const newLen=Math.max(GLOBE_MIN_DISTANCE,Math.min(GLOBE_MAX_DISTANCE,dir.length()/factor));
  dir.setLength(newLen);
  globeCamera.position.copy(globeControls.target).add(dir);
  globeControls.update();
}

function drawDonut(canvas,data){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=Math.min(w,h)/2-10,rw=16;
  ctx.clearRect(0,0,w,h);
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let start=-Math.PI/2;
  data.forEach(d=>{
    const angle=(d.value/total)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);
    ctx.strokeStyle=d.color;ctx.lineWidth=rw;ctx.stroke();
    start+=angle;
  });
  ctx.fillStyle='#EAF0FB';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(String(total),cx,cy);
}

function drawYearlyBars(canvas,yearCounts){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height,pad=6;
  ctx.clearRect(0,0,w,h);
  if(!yearCounts.length)return;
  const max=Math.max(1,...yearCounts.map(y=>y.count));
  const bw=(w-pad*2)/yearCounts.length;
  yearCounts.forEach((y,i)=>{
    const bh=(y.count/max)*(h-20);
    const x=pad+i*bw+bw*0.2;
    ctx.fillStyle=y.highlight?'#F4C95D':'rgba(255,255,255,.35)';
    ctx.beginPath();ctx.roundRect(x,h-bh-16,bw*0.6,bh,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText(String(y.year).slice(2),x+bw*0.3,h-4);
  });
}

  if(!trips.length){
    box.innerHTML='<div class="empty"><div class="empty-i">🧳</div><div class="empty-h">還沒有旅程</div></div>';

  const pills=['<div class="filter-pill '+(curRegionFilter==='all'?'on':'')+'" onclick="setRegionFilter(\'all\')">全部</div>']
    .concat(REGIONS.filter(r=>trips.some(t=>t.region===r.id)).map(r=>

    ));

  const viewToggle=`<div class="view-toggle">
    <div class="view-toggle-btn ${curTripView==='list'?'on':''}" onclick="setTripView('list')">☰</div>
    <div class="view-toggle-btn ${curTripView==='grid'?'on':''}" onclick="setTripView('grid')">▦</div>
  </div>`;
  let filtered=curRegionFilter==='all'?trips:trips.filter(t=>t.region===curRegionFilter);
  if(curTagFilter)filtered=filtered.filter(t=>(t.tags||[]).includes(curTagFilter));
  const sorted=[...filtered].sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));
  const listHtml=sorted.map(t=>`
      <div class="card trip-row" onclick="openTripDetail('${t.id}')">
        ${t.coverPhotoUrl?`<img class="trip-thumb" style="object-position:center ${t.coverPosY??50}%" src="${t.coverPhotoUrl}">`:`<div class="trip-flag">${countryFlags(t.countryCode)}</div>`}
        <div class="trip-info">
          <div class="trip-title">${esc(t.title)}</div>
          <div class="trip-meta">${(t.startDate||'').slice(0,7).replace('-','.')} · ${REGIONM[t.region]?.name||''}</div>
        </div>
      </div>`).join('');
  const gridHtml=`<div class="trip-grid">${sorted.map(t=>`
      <div class="card trip-card" onclick="openTripDetail('${t.id}')">
        ${t.coverPhotoUrl?`<img class="trip-card-img" style="object-position:center ${t.coverPosY??50}%" src="${t.coverPhotoUrl}">`:`<div class="trip-card-flag">${countryFlags(t.countryCode)}</div>`}
        <div class="trip-card-body">
          <div class="trip-card-title">${esc(t.title)}</div>
          <div class="trip-card-meta">${(t.startDate||'').slice(0,7).replace('-','.')} · ${REGIONM[t.region]?.name||''}</div>
        </div>
      </div>`).join('')}</div>`;
  box.innerHTML=`<div class="filter-row">${pills.join('')}${tagChip}${viewToggle}</div>`+
    (sorted.length?(curTripView==='grid'?gridHtml:listHtml):'<div class="empty"><div class="empty-i">🔍</div><div class="empty-h">沒有符合的旅程</div></div>');
}

function flagEmoji(code){
  if(!/^[A-Z]{2}$/.test(code))return'🏳️';
  return String.fromCodePoint(...[...code].map(c=>0x1F1E6+c.charCodeAt(0)-65));
}
function countryFlags(codes){return(codes||[]).map(flagEmoji).join('')||'🏳️';}

let curTripEntries={},curTripDays={};
let collapsedDays=new Set();

function openTripDetail(tripId){
  curDetailTripId=tripId;

  DB.ref('/trips/'+tripId+'/days').on('value',snap=>{curTripDays=snap.val()||{};renderTripDetail(tripId);});
}
const WEEKDAYS=['日','一','二','三','四','五','六'];
function fmtDayHeader(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T12:00:00');
  return`${d.getMonth()+1}/${d.getDate()} ${WEEKDAYS[d.getDay()]}`;
}
function groupEntriesByDate(list){
  const map={};
  list.forEach(e=>{(map[e.date]=map[e.date]||[]).push(e);});
  Object.values(map).forEach(items=>items.sort((a,b)=>(a.order||0)-(b.order||0)));
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
}
function dayLocation(tripId,trip,date){
  return(curTripDays[date]&&curTripDays[date].location)??trip.destination??'';
}
function toggleDayCard(date){
  if(collapsedDays.has(date))collapsedDays.delete(date);else collapsedDays.add(date);
  renderTripDetail(curDetailTripId);
}
function editDayLocation(tripId,date){
  const trip=(window.__STATS__.trips||[]).find(t=>t.id===tripId);
  const cur=dayLocation(tripId,trip,date);

  if(v==null)return;
  DB.ref('/trips/'+tripId+'/days/'+date).update({location:v.trim()});
}
function deleteDayConfirm(tripId,date){

// ─── Entry drag-to-reorder ───────────────────────────
function initEntryDnD(tripId){
  const box=document.getElementById('detailBox');
  let suppressClick=false;

  box.querySelectorAll('.entry-row-main').forEach(row=>{
    const entryRow=row.closest('.entry-row2');
    row.addEventListener('click',()=>{
      if(suppressClick){suppressClick=false;return;}
      openEditEntrySheet(tripId,entryRow.dataset.entryId);
    });
    row.addEventListener('pointerdown',e=>{
      const startX=e.clientX,startY=e.clientY;
      let moved=false,fired=false;
      const timer=setTimeout(()=>{
        if(!moved){fired=true;startDrag(entryRow,e);}
      },380);
      const onMove=me=>{
        if(Math.abs(me.clientX-startX)>8||Math.abs(me.clientY-startY)>8){
          moved=true;clearTimeout(timer);
          row.removeEventListener('pointermove',onMove);
        }
      };
      const onUp=()=>{clearTimeout(timer);row.removeEventListener('pointermove',onMove);};
      row.addEventListener('pointermove',onMove);
      row.addEventListener('pointerup',onUp,{once:true});
    });
  });

  function startDrag(entryRow,e){
    navigator.vibrate&&navigator.vibrate(30);
    suppressClick=true;
    const entryId=entryRow.dataset.entryId,fromDate=entryRow.dataset.date;
    entryRow.classList.add('dragging');
    const rect=entryRow.getBoundingClientRect();
    const ghost=entryRow.cloneNode(true);
    ghost.classList.add('entry-ghost');
    ghost.style.width=rect.width+'px';
    document.body.appendChild(ghost);
    positionGhost(ghost,e.clientX,e.clientY);
    document.querySelectorAll('.day-card-body').forEach(b=>b.classList.add('drop-target'));

    function onMove(me){
      positionGhost(ghost,me.clientX,me.clientY);
      document.querySelectorAll('.day-card-body').forEach(b=>b.classList.remove('drop-over'));
      const bodyEl=bodyFromPoint(me.clientX,me.clientY);
      if(bodyEl)bodyEl.classList.add('drop-over');
    }
    function onUp(me){
      document.removeEventListener('pointermove',onMove);
      document.removeEventListener('pointerup',onUp);
      ghost.remove();
      entryRow.classList.remove('dragging');
      document.querySelectorAll('.day-card-body').forEach(b=>b.classList.remove('drop-target','drop-over'));
      const bodyEl=bodyFromPoint(me.clientX,me.clientY);
      if(bodyEl){
        const toDate=bodyEl.dataset.date;
        const siblings=[...bodyEl.querySelectorAll('.entry-row2')].filter(r=>r!==entryRow);
        let insertBeforeId=null;
        for(const sib of siblings){
          const r=sib.getBoundingClientRect();
          if(me.clientY<r.top+r.height/2){insertBeforeId=sib.dataset.entryId;break;}
        }
        moveEntry(tripId,entryId,fromDate,toDate,insertBeforeId);
      }
      setTimeout(()=>{suppressClick=false;},50);
    }
    document.addEventListener('pointermove',onMove);
    document.addEventListener('pointerup',onUp);
  }
  function positionGhost(ghost,x,y){
    ghost.style.position='fixed';ghost.style.left=(x-ghost.offsetWidth/2)+'px';ghost.style.top=(y-20)+'px';ghost.style.zIndex=500;ghost.style.pointerEvents='none';
  }
  function bodyFromPoint(x,y){
    return document.elementsFromPoint(x,y).find(el=>el.classList&&el.classList.contains('day-card-body'));
  }
}
function moveEntry(tripId,entryId,fromDate,toDate,insertBeforeId){
  const all=Object.entries(curTripEntries).map(([id,e])=>({id,...e}));
  const targetList=all.filter(e=>e.date===toDate&&e.id!==entryId).sort((a,b)=>(a.order||0)-(b.order||0));
  let insertIdx=targetList.length;
  if(insertBeforeId){
    const idx=targetList.findIndex(e=>e.id===insertBeforeId);
    if(idx>-1)insertIdx=idx;
  }
  targetList.splice(insertIdx,0,{id:entryId});
  const updates={};
  targetList.forEach((e,i)=>{updates[e.id]={order:i*10};});
  if(fromDate!==toDate){
    updates[entryId]={...updates[entryId],date:toDate};
    const sourceList=all.filter(e=>e.date===fromDate&&e.id!==entryId).sort((a,b)=>(a.order||0)-(b.order||0));
    sourceList.forEach((e,i)=>{updates[e.id]={...(updates[e.id]||{}),order:i*10};});
  }
  Object.entries(updates).forEach(([id,patch])=>entriesRef(tripId).child(id).update(patch));
}

async function uploadTripPhotos(tripId,files){
  const urls=[];
  for(const file of files){
    const path=`trips/${tripId}/cover/${uid()}-${file.name}`;
    const ref=STORAGE.ref().child(path);
    await ref.put(file);
    urls.push(await ref.getDownloadURL());
  }
  return urls;
}
async function saveTrip(){
  const title=document.getElementById('mt_title').value.trim();
  const start=document.getElementById('mt_start').value;
  if(!title||!start){toast('⚠️ 標題與出發日期必填');return;}
  const fields={
    title,
    destination:document.getElementById('mt_dest').value.trim(),
    region:selTripRegion,
    startDate:start,
    endDate:document.getElementById('mt_end').value||start,
    lat:parseFloat(document.getElementById('mt_lat').value)||null,
    lng:parseFloat(document.getElementById('mt_lng').value)||null,
    tags:document.getElementById('mt_tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    countryCode:document.getElementById('mt_country').value.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean),
  };
  let id=editingTripId;
  if(id){
    updateTrip(id,fields);
  }else{
    id=createTrip({...fields,status:'visited',photos:[]});
  }
  closeM('m-trip');
  toast(editingTripId?'✅ 已更新旅程':'✅ 已建立旅程');
  if(pendingCoverFiles.length){
    toast('📤 上傳照片中…');
    try{
      const urls=await uploadTripPhotos(id,pendingCoverFiles);
      const photos=[...editingTripPhotos,...urls];
      const cover=editingTripCoverUrl||urls[0];
      updateTrip(id,{photos,coverPhotoUrl:cover,coverPosY:editingTripCoverPosY});
      toast('✅ 照片已上傳');
    }catch(e){toast('⚠️ 照片上傳失敗，可稍後重試');console.error(e);}
  }
  openTripDetail(id);
}

async function outboxFlush(){
  if(!navigator.onLine||!DB)return;
  const items=outboxRead();

  toast('🔄 同步離線紀錄中…');

}

  const urls=[];
  for(const file of files){
    const path=`trips/${tripId}/entries/${entryId}/${uid()}-${file.name}`;
    const ref=STORAGE.ref().child(path);
    await ref.put(file);
    urls.push(await ref.getDownloadURL());
  }
  return urls;
}
async function saveEntry(){
  const tripId=document.getElementById('me_tripid').value;
  const date=document.getElementById('me_date').value;
  if(!date){toast('⚠️ 日期必填');return;}
  const entry={
    date,
    location:document.getElementById('me_loc').value.trim(),
    text:document.getElementById('me_text').value.trim(),
    category:selEntryCat,
    photos:editingEntryId?existingEntryPhotos:[],
    order:editingEntryId?editingEntryOrder:Date.now(),
  };
  if(!editingEntryId&&!navigator.onLine){
    outboxAdd({tripId,entry});
    closeM('m-entry');
    toast('📴 離線中，已暫存，連網後自動同步（照片需連網後重新上傳）');
    return;
  }
  const entryId=editingEntryId||createEntry(tripId,entry);
  if(editingEntryId)updateEntry(tripId,entryId,entry);
  closeM('m-entry');
  toast('✅ 已儲存日記');
  if(pendingPhotoFiles.length){
    toast('📤 上傳照片中…');
    try{
      const urls=await uploadEntryPhotos(tripId,entryId,pendingPhotoFiles);
      updateEntry(tripId,entryId,{photos:[...(editingEntryId?existingEntryPhotos:[]),...urls]});
      toast('✅ 照片已上傳');
    }catch(e){toast('⚠️ 照片上傳失敗，可稍後重試');console.error(e);}
  }
}

// ─── Tabs ────────────────────────────────────────────
function goTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ti').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+t)?.classList.add('on');
  document.getElementById('t-'+t)?.classList.add('on');
  curTab=t;
  const fab=document.getElementById('fab');
  fab.style.display=(t==='cfg')?'none':'flex';
}
function fabTap(){
  if(curTab==='detail')openAddEntrySheet();
  else if(curTab==='trips')toast('請先點進一趟旅程再新增日記');
  else openAddTripSheet();
}
</script>
