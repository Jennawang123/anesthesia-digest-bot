  <polygon points="192,130 320,130 288,172 224,172" fill="#e0f2fe" opacity="0.85"/>
  <!-- Upper-left crown facet -->
  <polygon points="142,198 192,130 224,172 196,210" fill="#7dd3fc" opacity="0.75"/>
  <!-- Upper-right crown facet -->
  <polygon points="320,130 370,198 316,210 288,172" fill="#38bdf8" opacity="0.55"/>
  <!-- Center girdle facet -->
