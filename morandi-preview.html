<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>莫蘭迪色系預覽</title>
<style>
:root{
  --blue:#7B9BAA;--blue2:#4D7A8A;--cyan:#A8C5CE;
  --orange:#C4956A;--green:#8BA888;--red:#B47B7B;--purple:#9B8BAB;
  --bg:#F5F0EB;--card:#FDFAF7;--text:#3D3530;--muted:#9A8F89;--border:#E4DDD7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:430px;margin:0 auto;}

/* header */
.hdr{border-radius:16px;background:linear-gradient(150deg,var(--blue2),var(--blue) 55%,var(--cyan));padding:20px 16px 16px;margin-bottom:14px;color:#fff;}
.hdr-t{font-size:20px;font-weight:700;letter-spacing:.5px;}
.hdr-s{font-size:11px;opacity:.7;margin-top:4px;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#8BA888;display:inline-block;}

/* tabbar */
.tabbar{background:var(--card);border-top:1px solid var(--border);border-radius:16px;display:flex;margin-bottom:14px;overflow:hidden;}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;}
.ti.on{color:var(--blue);}
.ti-i{font-size:22px;line-height:1;}

/* day card */
.day-card{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(61,53,48,.06);}
.day-hdr{display:flex;align-items:center;padding:12px 14px;gap:10px;}
.day-n{width:38px;height:38px;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-info{flex:1;}
.day-tit{font-size:14px;font-weight:700;color:var(--text);}
.day-date-badge{font-size:12px;color:var(--muted);margin-left:6px;font-weight:400;}
.wchip{display:inline-flex;align-items:center;gap:2px;background:#E8F0F3;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;color:var(--blue2);}
.day-body{border-top:1px solid var(--border);}
.act-row{display:flex;align-items:flex-start;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.act-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.act-name{font-size:14px;font-weight:600;color:var(--text);}
.act-loc{font-size:12px;color:var(--muted);margin-top:2px;}
.act-cost{font-size:12px;color:var(--orange);margin-top:2px;font-weight:600;}
.day-add{padding:11px 14px;font-size:13px;color:var(--blue);font-weight:600;text-align:center;}

/* FAB */
.fab-wrap{position:relative;height:60px;margin-bottom:14px;}
.fab{position:absolute;right:0;width:54px;height:54px;border-radius:50%;background:var(--blue);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(75,122,138,.35);}

/* type grid */
.ac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.ac-btn{padding:9px 3px;border-radius:10px;border:2px solid var(--border);background:var(--card);text-align:center;}
.ac-btn.on{border-color:var(--blue);background:#EDF3F6;}
.ac-i{font-size:20px;display:block;}
.ac-n{font-size:10px;color:var(--muted);font-weight:600;}
.ac-btn.on .ac-n{color:var(--blue);}

/* expense pill */
.cat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cat-pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--card);color:var(--muted);}
.cat-pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* section label */
.section{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px;}

/* stats card */
.stat-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(61,53,48,.06);}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;}
.stat-val{font-size:22px;font-weight:700;color:var(--text);margin-top:2px;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.progress{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--blue);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}

/* btn */
.btn{padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
.btn-b{background:var(--blue);color:#fff;}
.btn-g{background:var(--bg);color:var(--text);}
</style>
</head>
<body>

<div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px;padding:8px;background:var(--card);border-radius:10px;border:1px solid var(--border)">👁️ 預覽用途，非實際 App</div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-t">岡山倉敷之旅</div>
  <div class="hdr-s"><span class="dot"></span>已同步 <span style="opacity:.4">v0611</span></div>
</div>

<!-- Tabbar -->
<div class="tabbar">
  <div class="ti on"><div class="ti-i">🗓️</div>行程</div>
  <div class="ti"><div class="ti-i">💰</div>記帳</div>
  <div class="ti"><div class="ti-i">📊</div>統計</div>
  <div class="ti"><div class="ti-i">⚙️</div>設定</div>
</div>

<!-- FAB -->
<div class="fab-wrap">
  <div class="fab">＋</div>
</div>

<!-- Day Card -->
<div class="section">行程卡片</div>
<div class="day-card">
  <div class="day-hdr">
    <div class="day-n">1</div>
    <div class="day-info">
      <div class="day-tit">Day 1 <span class="day-date-badge">6月15日（一）</span></div>
      <div style="margin-top:4px"><span class="wchip">⛅ 24°C 多雲</span></div>
    </div>
    <div style="color:var(--muted);font-size:20px">›</div>
  </div>
  <div class="day-body">
    <div class="act-row">
      <div class="act-ico" style="background:#E2DDE8">📍</div>
      <div style="flex:1">
        <div class="act-name">岡山城參觀</div>
        <div class="act-loc">📍 岡山城</div>
        <div class="act-cost">💰 ¥320</div>
      </div>
    </div>
    <div class="act-row">
      <div class="act-ico" style="background:#EDE6D8">🍽️</div>
      <div style="flex:1">
        <div class="act-name">後樂園附近午餐</div>
        <div class="act-loc">📍 後樂園</div>
      </div>
    </div>
    <div class="day-add">＋ 新增活動</div>
  </div>
</div>

<!-- Activity types -->
<div class="section">活動類型選擇</div>
<div class="ac-grid">
  <div class="ac-btn on" style="background:#E2DDE8"><span class="ac-i">📍</span><span class="ac-n">景點</span></div>
  <div class="ac-btn" style="background:#EDE6D8"><span class="ac-i">🍽️</span><span class="ac-n">餐廳</span></div>
  <div class="ac-btn" style="background:#D9E6EA"><span class="ac-i">🚌</span><span class="ac-n">交通</span></div>
  <div class="ac-btn" style="background:#D8E7DC"><span class="ac-i">🏨</span><span class="ac-n">住宿</span></div>
  <div class="ac-btn" style="background:#EBD9E4"><span class="ac-i">🛍️</span><span class="ac-n">購物</span></div>
  <div class="ac-btn" style="background:#EAD9D9"><span class="ac-i">🎭</span><span class="ac-n">娛樂</span></div>
  <div class="ac-btn" style="background:#E8DDE5"><span class="ac-i">🍰</span><span class="ac-n">甜點咖啡</span></div>
  <div class="ac-btn" style="background:#E8E4E0"><span class="ac-i">✏️</span><span class="ac-n">自訂</span></div>
</div>

<!-- Expense categories -->
<div class="section">記帳分類</div>
<div class="cat-row">
  <div class="cat-pill on">🍽️ 餐飲</div>
  <div class="cat-pill">🚌 交通</div>
  <div class="cat-pill">🏨 住宿</div>
  <div class="cat-pill">🎡 活動</div>
  <div class="cat-pill">🛍️ 購物</div>
  <div class="cat-pill">☕ 咖啡</div>
</div>

<!-- Stats -->
<div class="section">統計卡片</div>
<div class="two-col">
  <div class="stat-card">
    <div class="stat-label">總花費</div>
    <div class="stat-val">¥28,450</div>
    <div class="stat-sub">≈ NT$6,081</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">瑜自付</div>
    <div class="stat-val">¥14,200</div>
    <div class="progress"><div class="progress-fill" style="width:60%"></div></div>
  </div>
</div>

<!-- Buttons -->
<div class="section">按鈕</div>
<button class="btn btn-b">儲存</button>
<button class="btn btn-g">取消</button>

</body>
</html>
